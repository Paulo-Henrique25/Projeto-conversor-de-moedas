<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Oswald:wght@200..700&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>Convert Money</title>
</head>

<body>
    <img class="logo" src="./assets/logo.gif" alt="logo-convert-money">

    <main>

        <button class="theme-toggle">🌙</button>

        <label>
            Converter <b>de</b>
            <select class="from-currency">
                <option value="BRL">Real (BRL)</option>
                <option value="USD">Dólar (USD)</option>
                <option value="EUR">Euro (EUR)</option>
                <option value="GBP">Libra (GBP)</option>
            </select>
        </label>

        <button class="swap-button">⇄</button>

        <label>
            Converter <b>para</b>
            <select class="currency-select">
                <option value="USD">Dólar (USD)</option>
                <option value="EUR">Euro (EUR)</option>
                <option value="BRL">Real (BRL)</option>
                <option value="GBP">Libra (GBP)</option>
            </select>
        </label>

        <label>

            Valor
            <input class="input-currency" placeholder="10.000,00">

        </label>

        <button class="convert-button">Converter</button>
        <p class="status-message"></p>
        <div class="loader hidden"></div>

        <section>

            <div class="currency-box">
                <img class="currency-img-from" src="./assets/real.png">
                <p class="currency" id="currency-name-from">Real</p>
                <p class="currency-value-to-convert">R$ 0,00</p>
            </div>

            <img class="arrow-img" src="./assets/seta.png" alt="seta-convertendo-moedas">

            <div class="currency-box">
                <img class="currency-img" src="./assets/dolar.png" alt="logo-moeda-convertida">
                <p class="currency" id="currency-name">Dólar americano</p>
                <p class="currency-value">US$ 0,00</p>
            </div>

        </section>

        <div class="history">
            <h3>Histórico</h3>
            <ul class="history-list"></ul>
        </div>

        <button class="clear-history">Limpar histórico</button>

    </main>

    <div class="modal hidden" id="confirm-modal">
        <div class="modal-content">
            <p>Deseja realmente limpar o histórico?</p>

            <div class="modal-actions">
                <button class="cancel-btn">Cancelar</button>
                <button class="confirm-btn">Limpar</button>
            </div>
        </div>
    </div>

    <div class="toast hidden" id="toast"></div>

</body>
<script src="./scripts.js"></script>

</html>
